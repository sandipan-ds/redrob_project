team_name: "redrob_project"

primary_contact:
  name: ""
  email: ""
  phone: ""

team_members:
  - name: ""
    email: ""
    role: "ML Engineer"

# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: ""   # Fill in before submission

sandbox_link: ""  # Fill in before submission (HF Spaces / Streamlit / Colab)

reproduce_command: "docker build -t redrob-ranker . && docker run --rm --network none -v ${PWD}/data:/work/data -v ${PWD}/outputs:/work/outputs redrob-ranker python -m src.rank --candidates /work/data/candidates.jsonl --cache /work/artifacts --out /work/outputs/submission.csv"

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Windows 11 64-Bit"
  cpu_cores: 8
  ram_gb: 24
  python_version: "3.11"
  os: "Windows 11 64-Bit"
  uses_gpu_for_inference: false         # MUST be false (spec §3)
  has_network_during_ranking: false     # MUST be false (spec §3)
  pre_computation_required: true        # Embeddings precomputed offline
  pre_computation_time_minutes: 70      # MEASURED on full 100K (P8): 1h 09m 38s
                                        # (uncapped per §10.3; dev 50-sample precompute runs in ~2s)
  ranking_step_time_minutes: 0.42       # MEASURED on full 100K (P8): 25.4s
                                        # well under the 5-min §7.1 budget

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"
  - "GitLab Duo Chat"

ai_usage_summary: |
  Used Claude / GitLab Duo Chat for architecture discussion, code review, and
  config design. No candidate data was fed to any hosted LLM. All LLM use is
  offline/dev-time only; ranking is fully deterministic and CPU-only.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based + semantic ranker. Five scoring components (role fit via career
  description embeddings, JD-relevant skills with endorsement/duration trust,
  experience band, education tier+CGPA, location) combined with a multiplicative
  behavioral-signal modifier and hard penalty gates (honeypot, consulting-only,
  research-only, domain-mismatch). Role-fit is the dominant signal to defeat the
  keyword-stuffing trap. All LLM use is offline; runtime is vectorized NumPy/
  sklearn over precomputed embeddings — well within 5 min / 16 GB CPU budget.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true       # P2 complete — honeypot + 6 disqualifier gates + softening
  reproduction_tested: true       # P7 complete — Dockerfile + vendored model + no-network guard
